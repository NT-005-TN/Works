{% extends "base.html" %}
{% block content %}
<h2>Панель администратора</h2>
<h3>Проверка кокоса</h3>
<input type="file" id="coconutFile">
<button onclick="verifyCoconut()">Проверить</button>
<div id="verifyResult"></div>

<hr>
<h3>Управление базой</h3>
<button onclick="downloadDB()">Скачать базу (JSON)</button>
<input type="file" id="dbFile">
<button onclick="uploadDB()">Загрузить базу</button>

<script>
    async function verifyCoconut() {
        const fileInput = document.getElementById('coconutFile');
        const formData = new FormData();
        formData.append('image', fileInput.files[0]);
        
        const res = await fetch('/admin/verify_admin_image', {method: 'POST', body: formData});
        const data = await res.json();
        document.getElementById('verifyResult').innerText = data.success ? 'ДОСТУП РАЗРЕШЕН' : 'ОТКАЗАНО';
    }

    async function downloadDB() {
        const res = await fetch('/admin/get_database');
        const data = await res.json();
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'backup.json';
        a.click();
    }

    async function uploadDB() {
        const fileInput = document.getElementById('dbFile');
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        
        const res = await fetch('/admin/update_database', {method: 'POST', body: formData});
        const data = await res.json();
        alert(data.success ? 'База обновлена!' : 'Ошибка: ' + data.error);
    }
</script>
{% endblock %}
