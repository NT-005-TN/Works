<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Банк Анастасии</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .alert { color: red; margin-bottom: 10px; }
        nav { margin-top: 20px; padding-top: 10px; border-top: 1px solid #ccc; }
        nav a { margin-right: 15px; text-decoration: none; color: blue; }
    </style>
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    
    <!-- Исправлено: main.index вместо index -->
    <nav>
        <a href="{{ url_for('main.index') }}">Главная</a>
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('auth.logout') }}">Выйти</a>
        {% else %}
            <a href="{{ url_for('auth.login') }}">Войти</a>
        {% endif %}
    </nav>

    {% block content %}{% endblock %}
</body>
</html>
